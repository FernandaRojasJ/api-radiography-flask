name: CI Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci_xray_database.db
      SECRET_KEY: ${{ secrets.CI_SECRET_KEY || 'ci-secret-key' }}
      IMAGE_PRIVACY_SCHEDULER_ENABLED: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        run: python -m alembic upgrade head

      - name: Check Python syntax
        run: python -m compileall app

      - name: Run smoke tests
        run: |
          python - <<'PY'
          import time
          import jwt
          from app.main import create_app
          from app.core.config import Config

          app = create_app()
          client = app.test_client()

          # Public list endpoint should return OK.
          response_list = client.get("/radiographs")
          assert response_list.status_code == 200, response_list.get_data(as_text=True)

          # Protected endpoint should require auth.
          response_protected = client.get("/radiographs/1")
          assert response_protected.status_code == 401, response_protected.get_data(as_text=True)

          # Token endpoint should validate required payload.
          response_auth = client.post("/auth/token", json={})
          assert response_auth.status_code == 400, response_auth.get_data(as_text=True)

          # Expired JWT must be rejected by protected endpoints.
          now = int(time.time())
          expired_token = jwt.encode(
              {
                  "sub": "1",
                  "user_id": "1",
                  "iat": now - 7200,
                  "exp": now - 3600,
              },
              Config.SECRET_KEY,
              algorithm=Config.JWT_ALGORITHM,
          )
          response_expired = client.get(
              "/radiographs/1",
              headers={"Authorization": f"Bearer {expired_token}"},
          )
          assert response_expired.status_code == 401, response_expired.get_data(as_text=True)

          print("Smoke tests passed.")
          PY
